<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<title>Hex Terrain Generator V2</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    background: #0a0a14;
    color: #e6e6e6;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: grab;
    display: block;
    touch-action: none;
  }
  #canvas:active { cursor: grabbing; }

  .panel {
    position: absolute;
    background: rgba(15, 18, 28, 0.94);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid #2a3045;
    border-radius: 6px;
    z-index: 10;
    font-size: 12px;
  }

  #topbar {
    top: 8px; left: 8px; right: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
  }
  #topbar .viewToggle {
    display: flex;
    background: #14172a;
    border-radius: 4px;
    padding: 2px;
    border: 1px solid #2a3045;
  }
  #topbar .viewToggle button {
    background: transparent;
    color: #aab;
    border: none;
    padding: 6px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    min-height: 32px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: auto;
  }
  #topbar .viewToggle button.active { background: #1f3a5f; color: #cfe; }
  #topbar .title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #6cf;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #btnMenu {
    background: #14172a;
    color: #cfe;
    border: 1px solid #2a3045;
    border-radius: 4px;
    width: 36px; height: 36px;
    font-size: 18px;
    cursor: pointer;
    padding: 0;
  }
  #btnMenu:hover { background: #1f3a5f; }

  #controls {
    top: 56px; left: 8px;
    width: 280px;
    max-height: calc(100vh - 110px);
    overflow-y: auto;
    padding: 12px;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  #controls.collapsed {
    transform: translateX(-110%);
    opacity: 0;
    pointer-events: none;
  }

  #legend {
    top: 56px; right: 8px;
    padding: 10px;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  #legend.collapsed {
    transform: translateX(110%);
    opacity: 0;
    pointer-events: none;
  }
  #btnLegend {
    position: absolute;
    top: 56px; right: 8px;
    background: rgba(15, 18, 28, 0.94);
    backdrop-filter: blur(8px);
    border: 1px solid #2a3045;
    border-radius: 6px;
    color: #cfe;
    width: 36px; height: 36px;
    cursor: pointer;
    z-index: 11;
    font-size: 14px;
    display: none;
  }
  #legend.collapsed ~ #btnLegend { display: block; }

  #info {
    bottom: 8px; left: 8px;
    padding: 8px 10px;
    max-width: calc(100% - 16px);
    width: 280px;
  }

  h3 {
    margin: 0 0 8px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6cf;
    border-bottom: 1px solid #2a3045;
    padding-bottom: 6px;
  }
  hr { border: none; border-top: 1px solid #2a3045; margin: 10px 0; }
  .section-title {
    font-size: 10px;
    color: #aab;
    margin: 10px 0 4px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .row label { flex: 0 0 92px; color: #aab; font-size: 11px; }
  .row input[type="range"] { flex: 1; accent-color: #6cf; height: 28px; }
  .row .val { flex: 0 0 42px; text-align: right; color: #6cf; font-size: 11px; }

  input[type="number"] {
    background: #14172a;
    color: #e6e6e6;
    border: 1px solid #2a3045;
    padding: 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    min-height: 36px;
  }
  input[type="number"]:focus { outline: none; border-color: #6cf; }

  button {
    background: #1f3a5f;
    color: #cfe;
    border: 1px solid #2c5688;
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    width: 100%;
    min-height: 38px;
    transition: all 0.12s;
  }
  button:active { transform: scale(0.97); }
  button:hover  { background: #2c5688; color: #fff; }
  button.secondary { background: #2a2540; border-color: #443866; color: #cbf; }
  button.secondary:hover { background: #443866; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 12px; color: #aab; min-height: 24px; }
  .checkbox-row input { accent-color: #6cf; width: 16px; height: 16px; }

  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 11px; }
  .swatch { width: 22px; height: 14px; border: 1px solid #2a3045; border-radius: 2px; }

  #info .field { display: flex; justify-content: space-between; margin: 2px 0; font-size: 11px; }
  #info .key { color: #aab; }
  #info .v   { color: #cfe; }
  #info .biome { font-weight: bold; }

  .stack > * + * { margin-top: 6px; }

  @media (max-width: 720px) {
    #controls {
      top: 56px;
      left: 8px;
      right: 8px;
      width: auto;
    }
    #legend {
      top: 56px;
      right: 8px;
      max-width: 180px;
    }
    .row label { flex: 0 0 80px; font-size: 10px; }
    button { padding: 11px 12px; min-height: 42px; }
    #info { width: auto; right: 8px; }
  }

  .lod-indicator {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(15, 18, 28, 0.7);
    color: #6cf;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="topbar" class="panel">
  <button id="btnMenu" title="Toggle controls">≡</button>
  <div class="viewToggle">
    <button id="btnGameView" class="active" data-mode="game">Game</button>
    <button id="btnDebugView" data-mode="debug">Debug</button>
  </div>
  <div class="title">Hex Terrain V2</div>
</div>

<div id="controls" class="panel">
  <div class="row">
    <label>Seed</label>
    <input type="number" id="seedInput" value="12345">
  </div>
  <div class="stack">
    <button id="btnRegen">Regenerate</button>
    <button id="btnRandom" class="secondary">Random seed</button>
  </div>

  <div class="section-title">Presets</div>
  <div class="stack">
    <button class="preset" data-preset="balanced">⚖ Balanced</button>
    <button class="preset secondary" data-preset="dry">☀ Dry Continent</button>
    <button class="preset secondary" data-preset="wet">☔ Wet Forest World</button>
  </div>

  <hr>

  <div class="row"><label>Water level</label>
    <input type="range" id="waterLevel" min="0" max="1" step="0.01" value="0.40">
    <span class="val" id="waterLevelVal">0.40</span>
  </div>
  <div class="row"><label>Mountain</label>
    <input type="range" id="mountainLevel" min="0" max="1" step="0.01" value="0.66">
    <span class="val" id="mountainLevelVal">0.66</span>
  </div>
  <div class="row"><label>Elev scale</label>
    <input type="range" id="elevScale" min="0.005" max="0.08" step="0.001" value="0.020">
    <span class="val" id="elevScaleVal">0.020</span>
  </div>
  <div class="row"><label>Moist scale</label>
    <input type="range" id="moistScale" min="0.005" max="0.08" step="0.001" value="0.028">
    <span class="val" id="moistScaleVal">0.028</span>
  </div>
  <div class="row"><label>Moist bias</label>
    <input type="range" id="moistureBias" min="-0.4" max="0.4" step="0.01" value="0.00">
    <span class="val" id="moistureBiasVal">0.00</span>
  </div>

  <div class="section-title">Visual layers</div>
  <div class="checkbox-row">
    <input type="checkbox" id="showVariation" checked>
    <label for="showVariation">Per-hex + macro variation</label>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="showTransitions" checked>
    <label for="showTransitions">Biome transitions</label>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="showDetails" checked>
    <label for="showDetails">Detail marks (zoom in)</label>
  </div>

  <div class="section-title">Game grid</div>
  <div class="checkbox-row">
    <input type="checkbox" id="showHexGridInGame">
    <label for="showHexGridInGame">Show grid in Game</label>
  </div>
  <div class="row"><label>Grid opacity</label>
    <input type="range" id="gameGridOpacity" min="0" max="0.20" step="0.01" value="0.04">
    <span class="val" id="gameGridOpacityVal">0.04</span>
  </div>

  <div class="section-title">Debug overlays</div>
  <div class="checkbox-row">
    <input type="checkbox" id="showSelectedCenterDot">
    <label for="showSelectedCenterDot">Center dot on selected</label>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="showAxialTextOnHover">
    <label for="showAxialTextOnHover">Axial text on hover</label>
  </div>

  <div class="section-title">Camera</div>
  <div style="display:flex;gap:6px;">
    <button id="btnZoomOut" class="secondary" style="flex:1;">− Zoom</button>
    <button id="btnZoomIn"  class="secondary" style="flex:1;">+ Zoom</button>
  </div>
  <div style="margin-top:6px;">
    <button id="btnCenter" class="secondary">⊙ Fit map</button>
  </div>

  <hr>
  <div class="stack">
    <button id="btnExportVisible">Export visible JSON</button>
    <button id="btnExportFull" class="secondary">Export full JSON</button>
  </div>
</div>

<div id="legend" class="panel">
  <h3>Legend</h3>
  <div id="legendBody"></div>
  <button id="btnLegendClose" class="secondary" style="margin-top:8px;font-size:10px;padding:4px;min-height:24px;">Hide</button>
</div>
<button id="btnLegend" title="Show legend">L</button>

<div id="info" class="panel">
  <div id="infoBody" style="font-size:11px;color:#aab;">Tap/hover hex để xem...</div>
</div>

<div class="lod-indicator" id="lodInfo"></div>

<script>
'use strict';

// ============================================================
// CONSTANTS
// ============================================================
const MAP_W = 160;
const MAP_H = 100;
const HEX_SIZE = 18;
const SQRT3 = Math.sqrt(3);

const NEIGHBORS = [
  { dq: +1, dr:  0 },
  { dq:  0, dr: +1 },
  { dq: -1, dr: +1 },
  { dq: -1, dr:  0 },
  { dq:  0, dr: -1 },
  { dq: +1, dr: -1 },
];

const BIOME_COLORS = {
  ocean:    '#1a3a5c',
  coast:    '#e8d4a0',
  plain:    '#9bc66a',
  forest:   '#2c5e34',
  hill:     '#8a8a4a',
  mountain: '#7d8590',
  desert:   '#e8c95a',
  swamp:    '#3d5240',
};

const BIOME_LOCAL = {
  ocean:  6, coast: 10, plain: 12, forest: 14,
  hill:  12, mountain: 14, desert: 12, swamp: 10,
};

const BIOME_MACRO = {
  ocean: 10, coast:  8, plain: 14, forest: 18,
  hill:  14, mountain: 22, desert: 12, swamp: 12,
};

const MACRO_SCALE = 0.012;
const FOREST_DENSITY_SCALE = 0.04;
const RIDGE_ANGLE_SCALE = 0.05;

const TRANSITIONS = {
  'coast|ocean':   { color: 'rgb(245, 235, 195)', alpha: 0.55, width: 0.30 },
  'ocean|coast':   { color: 'rgb(35,  80, 130)',  alpha: 0.30, width: 0.20 },
  'coast|plain':   { color: 'rgb(160, 185, 115)', alpha: 0.40, width: 0.25 },
  'plain|coast':   { color: 'rgb(205, 195, 135)', alpha: 0.35, width: 0.22 },
  'plain|forest':  { color: 'rgb(40, 80, 45)',    alpha: 0.50, width: 0.28 },
  'forest|plain':  { color: 'rgb(115, 155, 85)',  alpha: 0.40, width: 0.22 },
  'plain|hill':    { color: 'rgb(125, 130, 70)',  alpha: 0.40, width: 0.25 },
  'hill|plain':    { color: 'rgb(140, 160, 80)',  alpha: 0.35, width: 0.22 },
  'hill|mountain': { color: 'rgb(95, 95, 95)',    alpha: 0.55, width: 0.30 },
  'mountain|hill': { color: 'rgb(130, 125, 95)',  alpha: 0.30, width: 0.20 },
  'plain|desert':  { color: 'rgb(220, 200, 110)', alpha: 0.40, width: 0.26 },
  'desert|plain':  { color: 'rgb(180, 195, 100)', alpha: 0.40, width: 0.24 },
  'desert|hill':   { color: 'rgb(150, 120, 70)',  alpha: 0.40, width: 0.25 },
  'hill|desert':   { color: 'rgb(195, 170, 90)',  alpha: 0.35, width: 0.23 },
  'swamp|plain':   { color: 'rgb(80, 100, 70)',   alpha: 0.45, width: 0.25 },
  'plain|swamp':   { color: 'rgb(75, 110, 70)',   alpha: 0.45, width: 0.25 },
  'swamp|forest':  { color: 'rgb(45, 70, 50)',    alpha: 0.45, width: 0.25 },
  'forest|swamp':  { color: 'rgb(55, 90, 55)',    alpha: 0.40, width: 0.22 },
  'coast|desert':  { color: 'rgb(230, 210, 130)', alpha: 0.35, width: 0.23 },
  'desert|coast':  { color: 'rgb(225, 200, 140)', alpha: 0.35, width: 0.23 },
};

let canvas, ctx;
const camera = { x: 0, y: 0, zoom: 1 };
const mouse  = { x: 0, y: 0, hex: null, dragging: false, lastX: 0, lastY: 0 };
let world = [];

const params = {
  seed: 12345,
  waterLevel:    0.40,
  mountainLevel: 0.66,
  elevScale:     0.020,
  moistScale:    0.028,
  moistureBias:  0.00,
  showVariation:   true,
  showTransitions: true,
  showDetails:     true,
  showHexGridInGame: false,
  gameGridOpacity:   0.04,
  showSelectedCenterDot: false,
  showAxialTextOnHover:  false,
  viewMode: 'game',
};

const PRESETS = {
  balanced: { waterLevel: 0.40, mountainLevel: 0.66, elevScale: 0.020, moistScale: 0.028, moistureBias:  0.00 },
  dry:      { waterLevel: 0.32, mountainLevel: 0.70, elevScale: 0.022, moistScale: 0.032, moistureBias: -0.20 },
  wet:      { waterLevel: 0.48, mountainLevel: 0.80, elevScale: 0.034, moistScale: 0.020, moistureBias: +0.18 },
};

function hash2D(seed, x, y) {
  let h = seed | 0;
  h = Math.imul(h ^ (x | 0), 0x85ebca6b);
  h = Math.imul(h ^ (y | 0), 0xc2b2ae35);
  h ^= h >>> 13;
  h = Math.imul(h, 0x5bd1e995);
  h ^= h >>> 15;
  return (h >>> 0) / 4294967296;
}

function random01(q, r, seed, salt = 0) {
  return hash2D(seed * 17 + salt * 1000003, q, r);
}

const smoothstep = t => t * t * (3 - 2 * t);
const lerp = (a, b, t) => a + (b - a) * t;

function valueNoise(seed, x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const v00 = hash2D(seed, xi,     yi);
  const v10 = hash2D(seed, xi + 1, yi);
  const v01 = hash2D(seed, xi,     yi + 1);
  const v11 = hash2D(seed, xi + 1, yi + 1);
  const u = smoothstep(xf), v = smoothstep(yf);
  return lerp(lerp(v00, v10, u), lerp(v01, v11, u), v);
}

function fbmNoise(seed, x, y, octaves = 5, persistence = 0.5, lacunarity = 2.0) {
  let total = 0, amp = 1, freq = 1, maxVal = 0;
  for (let i = 0; i < octaves; i++) {
    total += valueNoise(seed + i * 1013, x * freq, y * freq) * amp;
    maxVal += amp;
    amp *= persistence;
    freq *= lacunarity;
  }
  return total / maxVal;
}

function axialToPixel(q, r) {
  return { x: HEX_SIZE * 1.5 * q, y: HEX_SIZE * SQRT3 * (r + q / 2) };
}
function pixelToAxialFloat(x, y) {
  return {
    q: (2 / 3) * x / HEX_SIZE,
    r: (-x / 3 + (SQRT3 / 3) * y) / HEX_SIZE,
  };
}
function roundAxial(qf, rf) {
  let x = qf, z = rf, y = -x - z;
  let rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
  const dx = Math.abs(rx - x), dy = Math.abs(ry - y), dz = Math.abs(rz - z);
  if (dx > dy && dx > dz)      rx = -ry - rz;
  else if (dy > dz)            ry = -rx - rz;
  else                         rz = -rx - ry;
  return { q: rx, r: rz };
}
function inBounds(q, r) { return q >= 0 && q < MAP_W && r >= 0 && r < MAP_H; }

function buildHexPath(cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i;
    const px = cx + size * Math.cos(a);
    const py = cy + size * Math.sin(a);
    if (i === 0) ctx.moveTo(px, py);
    else         ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function getTerrain(q, r) {
  const seed = params.seed;
  let elevation = fbmNoise(seed, q * params.elevScale, r * params.elevScale, 6, 0.5, 2.0);
  const ndx = (q - MAP_W / 2) / (MAP_W / 2);
  const ndy = (r - MAP_H / 2) / (MAP_H / 2);
  const dist = Math.sqrt(ndx * ndx + ndy * ndy);
  const falloff = Math.max(0, 1 - Math.pow(dist, 2.4));
  elevation = elevation * 0.7 + falloff * 0.3;
  elevation = Math.pow(elevation, 0.85);
  elevation = Math.max(0, Math.min(1, elevation));

  let moisture = fbmNoise(seed + 9999, q * params.moistScale, r * params.moistScale, 4, 0.5, 2.0);
  moisture = Math.max(0, Math.min(1, moisture + params.moistureBias));

  const lat = Math.abs((r - MAP_H / 2) / (MAP_H / 2));
  const tn = fbmNoise(seed + 4242, q * 0.05, r * 0.05, 3, 0.5, 2.0);
  let temperature = (1 - lat) * 0.85 + tn * 0.15;
  temperature -= Math.max(0, elevation - params.waterLevel) * 0.4;
  temperature = Math.max(0, Math.min(1, temperature));

  return { q, r, elevation, moisture, temperature, biome: classifyBiome(elevation, moisture, temperature) };
}

function classifyBiome(elev, moist, temp) {
  if (elev < params.waterLevel)            return 'ocean';
  if (elev < params.waterLevel + 0.04)     return 'coast';
  if (elev > params.mountainLevel)         return 'mountain';
  if (elev > params.mountainLevel - 0.10)  return 'hill';
  if (moist < 0.38 && temp > 0.50)         return 'desert';
  if (moist > 0.68 && elev < params.waterLevel + 0.20) return 'swamp';
  if (moist > 0.55)                        return 'forest';
  return 'plain';
}

function generateWorld() {
  world = new Array(MAP_W);
  for (let q = 0; q < MAP_W; q++) {
    world[q] = new Array(MAP_H);
    for (let r = 0; r < MAP_H; r++) world[q][r] = getTerrain(q, r);
  }
}

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}
function rgbStr(r, g, b) {
  const c = v => Math.max(0, Math.min(255, Math.round(v)));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}
function adjustColor(hex, amount) {
  const { r, g, b } = hexToRgb(hex);
  return rgbStr(r + amount, g + amount, b + amount);
}

function getBiomeBaseColor(biome) {
  return BIOME_COLORS[biome] || '#888';
}

function getBiomeVariantColor(tile, zoom) {
  const { biome, q, r, elevation } = tile;
  const seed = params.seed;
  const base = BIOME_COLORS[biome] || '#888';
  if (!params.showVariation) return base;

  const local = (random01(q, r, seed, 7) - 0.5) * 2 * (BIOME_LOCAL[biome] || 10);

  const macroN = fbmNoise(seed + 31337, q * MACRO_SCALE, r * MACRO_SCALE, 2, 0.5, 2.0);
  const macro = (macroN - 0.5) * 2 * (BIOME_MACRO[biome] || 12);

  let elevShade = 0;
  switch (biome) {
    case 'mountain': elevShade = (elevation - 0.78) * 110; break;
    case 'hill':     elevShade = (elevation - 0.60) * 60;  break;
    case 'ocean':    elevShade = (elevation - 0.30) * 70;  break;
    case 'coast':    elevShade = (elevation - params.waterLevel - 0.02) * 80; break;
    case 'desert':   elevShade = (elevation - 0.50) * 25;  break;
    case 'forest':   elevShade = (elevation - 0.50) * 22;  break;
    case 'plain':    elevShade = (elevation - 0.50) * 15;  break;
    case 'swamp':    elevShade = (elevation - 0.40) * 18;  break;
    default:         elevShade = (elevation - 0.50) * 15;
  }

  return adjustColor(base, local + macro + elevShade);
}

function getLOD(zoom) {
  if (zoom < 0.45) return 0;
  if (zoom < 1.10) return 1;
  return 2;
}

function drawBaseTerrain(ctx, tile, x, y, lod) {
  buildHexPath(x, y, HEX_SIZE);
  const useVariant = params.showVariation && params.viewMode !== 'debug';
  ctx.fillStyle = useVariant
    ? getBiomeVariantColor(tile, camera.zoom)
    : getBiomeBaseColor(tile.biome);
  ctx.fill();
}

function drawEdgeBand(ctx, cx, cy, dir, color, alpha, widthRatio) {
  const a1 = (Math.PI / 3) * dir;
  const a2 = (Math.PI / 3) * ((dir + 1) % 6);
  const inset = 1 - widthRatio;

  const ex1 = cx + HEX_SIZE * Math.cos(a1);
  const ey1 = cy + HEX_SIZE * Math.sin(a1);
  const ex2 = cx + HEX_SIZE * Math.cos(a2);
  const ey2 = cy + HEX_SIZE * Math.sin(a2);
  const ix1 = cx + HEX_SIZE * Math.cos(a1) * inset;
  const iy1 = cy + HEX_SIZE * Math.sin(a1) * inset;
  const ix2 = cx + HEX_SIZE * Math.cos(a2) * inset;
  const iy2 = cy + HEX_SIZE * Math.sin(a2) * inset;

  ctx.beginPath();
  ctx.moveTo(ix1, iy1);
  ctx.lineTo(ix2, iy2);
  ctx.lineTo(ex2, ey2);
  ctx.lineTo(ex1, ey1);
  ctx.closePath();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawBiomeTransitions(ctx, tile, x, y, lod) {
  if (lod < 1) return;
  if (!params.showTransitions) return;
  const my = tile.biome;
  for (let i = 0; i < 6; i++) {
    const n = NEIGHBORS[i];
    const nq = tile.q + n.dq, nr = tile.r + n.dr;
    if (!inBounds(nq, nr)) continue;
    const neighbor = world[nq][nr];
    if (neighbor.biome === my) continue;
    const t = TRANSITIONS[my + '|' + neighbor.biome];
    if (!t) continue;
    drawEdgeBand(ctx, x, y, i, t.color, t.alpha, t.width);
  }
}

function isLocalMaxMountain(q, r) {
  const tile = world[q] && world[q][r];
  if (!tile || tile.biome !== 'mountain') return false;
  for (let i = 0; i < 6; i++) {
    const nq = q + NEIGHBORS[i].dq, nr = r + NEIGHBORS[i].dr;
    if (!inBounds(nq, nr)) continue;
    if (world[nq][nr].elevation > tile.elevation) return false;
  }
  return true;
}

function drawMountainDetail(ctx, tile, x, y, lod) {
  const { q, r, elevation } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;

  if (lod >= 1) {
    const angleN = fbmNoise(seed + 88888, q * RIDGE_ANGLE_SCALE, r * RIDGE_ANGLE_SCALE, 2, 0.5, 2);
    const angle = angleN * Math.PI - Math.PI / 4;
    const len = S * (0.40 + random01(q, r, seed, 11) * 0.35);
    const dx = Math.cos(angle) * len;
    const dy = Math.sin(angle) * len;

    const cx = x + (random01(q, r, seed, 20) - 0.5) * S * 0.25;
    const cy = y + (random01(q, r, seed, 21) - 0.5) * S * 0.25;

    ctx.strokeStyle = 'rgba(45, 50, 60, 0.5)';
    ctx.lineWidth = S * 0.08;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - dx * 0.5, cy - dy * 0.5);
    ctx.lineTo(cx + dx * 0.5, cy + dy * 0.5);
    ctx.stroke();

    if (random01(q, r, seed, 22) > 0.4) {
      const px = -dy * 0.18;
      const py =  dx * 0.18;
      ctx.strokeStyle = 'rgba(190, 200, 215, 0.28)';
      ctx.lineWidth = S * 0.05;
      ctx.beginPath();
      ctx.moveTo(cx - dx * 0.4 + px, cy - dy * 0.4 + py);
      ctx.lineTo(cx + dx * 0.4 + px, cy + dy * 0.4 + py);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  }

  if (lod >= 2 && isLocalMaxMountain(q, r)) {
    const px = x;
    const py = y - S * 0.12;
    ctx.fillStyle = 'rgba(50, 55, 65, 0.85)';
    ctx.beginPath();
    ctx.moveTo(px - S * 0.28, py + S * 0.32);
    ctx.lineTo(px,             py - S * 0.10);
    ctx.lineTo(px + S * 0.28,  py + S * 0.32);
    ctx.closePath();
    ctx.fill();

    if (elevation > 0.85) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
      ctx.beginPath();
      ctx.moveTo(px - S * 0.10, py + S * 0.03);
      ctx.lineTo(px,             py - S * 0.10);
      ctx.lineTo(px + S * 0.10, py + S * 0.03);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawForestDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;

  const localRng = random01(q, r, seed, 0);
  const macroRng = fbmNoise(seed + 71717, q * FOREST_DENSITY_SCALE, r * FOREST_DENSITY_SCALE, 2, 0.5, 2);
  const density = (localRng + macroRng) * 0.5;
  if (density < 0.18) return;

  const treeCount = 2 + Math.floor(density * 6);
  const baseTone   = density > 0.55 ? 'rgba(15, 50, 22, 0.78)' : 'rgba(30, 75, 35, 0.70)';
  const highlight  = 'rgba(85, 135, 65, 0.40)';

  for (let i = 0; i < treeCount; i++) {
    const a  = random01(q, r, seed, i * 2 + 11) * Math.PI * 2;
    const d  = random01(q, r, seed, i * 2 + 12) * S * 0.7;
    const tx = x + Math.cos(a) * d;
    const ty = y + Math.sin(a) * d;
    const radius = S * (0.10 + random01(q, r, seed, i * 3 + 17) * 0.07);

    ctx.fillStyle = baseTone;
    ctx.beginPath();
    ctx.arc(tx, ty, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = highlight;
    ctx.beginPath();
    ctx.arc(tx - radius * 0.32, ty - radius * 0.32, radius * 0.45, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHillDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;
  if (random01(q, r, seed, 0) < 0.25) return;

  const n = 2 + Math.floor(random01(q, r, seed, 1) * 2);
  ctx.fillStyle = 'rgba(95, 75, 50, 0.55)';
  for (let i = 0; i < n; i++) {
    const a = random01(q, r, seed, i * 2 + 4) * Math.PI * 2;
    const d = random01(q, r, seed, i * 2 + 5) * S * 0.55;
    const px = x + Math.cos(a) * d;
    const py = y + Math.sin(a) * d;
    const radius = S * (0.07 + random01(q, r, seed, i * 3 + 8) * 0.04);
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlainDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;
  if (random01(q, r, seed, 0) < 0.40) return;

  const n = 2 + Math.floor(random01(q, r, seed, 1) * 3);
  ctx.strokeStyle = 'rgba(60, 110, 45, 0.42)';
  ctx.lineWidth = 0.7;
  for (let i = 0; i < n; i++) {
    const a = random01(q, r, seed, i * 2 + 3) * Math.PI * 2;
    const d = random01(q, r, seed, i * 2 + 4) * S * 0.55;
    const px = x + Math.cos(a) * d;
    const py = y + Math.sin(a) * d;
    ctx.beginPath();
    ctx.moveTo(px - 0.3, py + 1.3);
    ctx.lineTo(px,        py - 1.3);
    ctx.stroke();
  }
}

function drawDesertDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;

  ctx.strokeStyle = 'rgba(165, 135, 70, 0.32)';
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 2; i++) {
    const cy = y + (random01(q, r, seed, i * 4) - 0.5) * S * 0.55;
    const dx = (random01(q, r, seed, i * 4 + 1) - 0.5) * S * 0.25;
    ctx.beginPath();
    ctx.moveTo(x - S * 0.42 + dx, cy);
    ctx.quadraticCurveTo(x + dx, cy + 1.5, x + S * 0.42 + dx, cy);
    ctx.stroke();
  }
}

function drawSwampDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;

  ctx.fillStyle = 'rgba(20, 38, 25, 0.65)';
  for (let i = 0; i < 4; i++) {
    const a = random01(q, r, seed, i * 2 + 3) * Math.PI * 2;
    const d = random01(q, r, seed, i * 2 + 4) * S * 0.55;
    ctx.beginPath();
    ctx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, S * 0.085, 0, Math.PI * 2);
    ctx.fill();
  }
  if (random01(q, r, seed, 99) > 0.5) {
    ctx.fillStyle = 'rgba(75, 115, 90, 0.55)';
    ctx.beginPath();
    ctx.arc(
      x + (random01(q, r, seed, 98) - 0.5) * S * 0.3,
      y + (random01(q, r, seed, 97) - 0.5) * S * 0.3,
      S * 0.13, 0, Math.PI * 2
    );
    ctx.fill();
  }
}

function drawCoastDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;

  ctx.strokeStyle = 'rgba(255, 250, 220, 0.50)';
  ctx.lineWidth = 0.85;
  for (let i = 0; i < 2; i++) {
    const cy = y - S * 0.15 + i * S * 0.32 + (random01(q, r, seed, i * 3) - 0.5) * S * 0.1;
    const dx = (random01(q, r, seed, i * 3 + 1) - 0.5) * S * 0.22;
    ctx.beginPath();
    ctx.moveTo(x - S * 0.45 + dx, cy);
    ctx.quadraticCurveTo(x + dx, cy + 2.2, x + S * 0.45 + dx, cy);
    ctx.stroke();
  }
}

function drawOceanDetail(ctx, tile, x, y, lod) {
  if (lod < 2) return;
  const { q, r } = tile;
  const seed = params.seed;
  const S = HEX_SIZE;
  if (random01(q, r, seed, 0) < 0.6) return;

  ctx.strokeStyle = 'rgba(160, 200, 240, 0.22)';
  ctx.lineWidth = 0.8;
  const cy = y + (random01(q, r, seed, 1) - 0.5) * S * 0.5;
  const w = S * 0.36;
  ctx.beginPath();
  ctx.moveTo(x - w, cy);
  ctx.quadraticCurveTo(x, cy - 1.5, x + w, cy);
  ctx.stroke();
}

function drawTerrainDetails(ctx, tile, x, y, lod) {
  if (lod < 1) return;
  switch (tile.biome) {
    case 'mountain': drawMountainDetail(ctx, tile, x, y, lod); break;
    case 'forest':   drawForestDetail  (ctx, tile, x, y, lod); break;
    case 'hill':     drawHillDetail    (ctx, tile, x, y, lod); break;
    case 'plain':    drawPlainDetail   (ctx, tile, x, y, lod); break;
    case 'desert':   drawDesertDetail  (ctx, tile, x, y, lod); break;
    case 'swamp':    drawSwampDetail   (ctx, tile, x, y, lod); break;
    case 'coast':    drawCoastDetail   (ctx, tile, x, y, lod); break;
    case 'ocean':    drawOceanDetail   (ctx, tile, x, y, lod); break;
  }
}

function drawHexOutline(ctx, x, y, color, lineWidth) {
  buildHexPath(x, y, HEX_SIZE);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

function renderVisibleHexes() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(canvas.width / 2 + camera.x, canvas.height / 2 + camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  const halfW = canvas.width  / (2 * camera.zoom);
  const halfH = canvas.height / (2 * camera.zoom);
  const pad   = HEX_SIZE * 2;
  const minX = -camera.x / camera.zoom - halfW - pad;
  const maxX = -camera.x / camera.zoom + halfW + pad;
  const minY = -camera.y / camera.zoom - halfH - pad;
  const maxY = -camera.y / camera.zoom + halfH + pad;

  const qMin = Math.max(0,         Math.floor((2 / 3) * minX / HEX_SIZE));
  const qMax = Math.min(MAP_W - 1, Math.ceil ((2 / 3) * maxX / HEX_SIZE));

  const lod = getLOD(camera.zoom);
  const isDebug = params.viewMode === 'debug';

  const getRRange = (q) => {
    const rFromY = y => y / (HEX_SIZE * SQRT3) - q / 2;
    return {
      min: Math.max(0,         Math.floor(rFromY(minY))),
      max: Math.min(MAP_H - 1, Math.ceil (rFromY(maxY))),
    };
  };

  for (let q = qMin; q <= qMax; q++) {
    const { min: rMin, max: rMax } = getRRange(q);
    for (let r = rMin; r <= rMax; r++) {
      const tile = world[q][r];
      const { x, y } = axialToPixel(q, r);
      drawBaseTerrain(ctx, tile, x, y, lod);
    }
  }

  if (!isDebug && lod >= 1 && params.showTransitions) {
    for (let q = qMin; q <= qMax; q++) {
      const { min: rMin, max: rMax } = getRRange(q);
      for (let r = rMin; r <= rMax; r++) {
        const tile = world[q][r];
        const { x, y } = axialToPixel(q, r);
        drawBiomeTransitions(ctx, tile, x, y, lod);
      }
    }
  }

  if (!isDebug && params.showDetails && lod >= 1) {
    for (let q = qMin; q <= qMax; q++) {
      const { min: rMin, max: rMax } = getRRange(q);
      for (let r = rMin; r <= rMax; r++) {
        const tile = world[q][r];
        const { x, y } = axialToPixel(q, r);
        drawTerrainDetails(ctx, tile, x, y, lod);
      }
    }
  }

  let outlineColor = null, outlineWidth = 0;
  if (isDebug) {
    outlineColor = 'rgba(0, 0, 0, 0.50)';
    outlineWidth = Math.max(0.5, 0.8 / camera.zoom);
  } else if (params.showHexGridInGame && params.gameGridOpacity > 0.001) {
    outlineColor = `rgba(0, 0, 0, ${params.gameGridOpacity})`;
    outlineWidth = Math.max(0.4, 0.6 / camera.zoom);
  }
  if (outlineColor) {
    ctx.strokeStyle = outlineColor;
    ctx.lineWidth = outlineWidth;
    for (let q = qMin; q <= qMax; q++) {
      const { min: rMin, max: rMax } = getRRange(q);
      for (let r = rMin; r <= rMax; r++) {
        const { x, y } = axialToPixel(q, r);
        buildHexPath(x, y, HEX_SIZE);
        ctx.stroke();
      }
    }
  }

  if (mouse.hex && inBounds(mouse.hex.q, mouse.hex.r)) {
    const { x, y } = axialToPixel(mouse.hex.q, mouse.hex.r);
    drawHexOutline(ctx, x, y, '#ffeb3b', Math.max(1.5, 2 / camera.zoom));

    if (params.showSelectedCenterDot) {
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath();
      ctx.arc(x, y, Math.max(2, 3 / camera.zoom), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();

  if (params.showAxialTextOnHover && mouse.hex && inBounds(mouse.hex.q, mouse.hex.r)) {
    const { x: wx, y: wy } = axialToPixel(mouse.hex.q, mouse.hex.r);
    const sx = canvas.width  / 2 + camera.x + wx * camera.zoom;
    const sy = canvas.height / 2 + camera.y + wy * camera.zoom;
    const fontSize = Math.max(11, Math.min(16, 9 + camera.zoom * 5));
    ctx.font = `bold ${fontSize}px ui-monospace, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const text = `${mouse.hex.q},${mouse.hex.r}`;
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#000';
    ctx.strokeText(text, sx, sy);
    ctx.fillStyle = '#fff';
    ctx.fillText(text, sx, sy);
  }

  document.getElementById('lodInfo').textContent =
    `zoom ${camera.zoom.toFixed(2)}x · LOD ${lod} · ${params.viewMode}`;
}

function getHexUnderMouse(mx, my) {
  const wx = (mx - canvas.width  / 2 - camera.x) / camera.zoom;
  const wy = (my - canvas.height / 2 - camera.y) / camera.zoom;
  const f  = pixelToAxialFloat(wx, wy);
  return roundAxial(f.q, f.r);
}

function setupMouse() {
  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    mouse.dragging = true;
    mouse.lastX = e.clientX;
    mouse.lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => { mouse.dragging = false; });
  window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    if (mouse.dragging) {
      camera.x += e.clientX - mouse.lastX;
      camera.y += e.clientY - mouse.lastY;
      mouse.lastX = e.clientX;
      mouse.lastY = e.clientY;
    }
    mouse.hex = getHexUnderMouse(mouse.x, mouse.y);
    updateInfo();
    requestRender();
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) - canvas.width  / 2;
    const my = (e.clientY - rect.top ) - canvas.height / 2;
    const delta = -Math.sign(e.deltaY) * 0.12;
    const newZoom = Math.max(0.15, Math.min(5, camera.zoom * (1 + delta)));
    const f = newZoom / camera.zoom;
    camera.x = mx - (mx - camera.x) * f;
    camera.y = my - (my - camera.y) * f;
    camera.zoom = newZoom;
    requestRender();
  }, { passive: false });
}

function setupTouch() {
  let pinchPrev = null;
  let panPrev = null;
  let touchStart = null;
  const TAP_THRESHOLD = 10;
  const TAP_TIME = 300;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      panPrev = { x: t.clientX, y: t.clientY };
      touchStart = { x: t.clientX, y: t.clientY, time: Date.now() };
      pinchPrev = null;
    } else if (e.touches.length >= 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
      pinchPrev = {
        dist: Math.sqrt(dx * dx + dy * dy),
        cx: (t1.clientX + t2.clientX) / 2,
        cy: (t1.clientY + t2.clientY) / 2,
      };
      panPrev = null;
      touchStart = null;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && panPrev) {
      const t = e.touches[0];
      camera.x += t.clientX - panPrev.x;
      camera.y += t.clientY - panPrev.y;
      panPrev.x = t.clientX;
      panPrev.y = t.clientY;
      if (touchStart) {
        const ddx = t.clientX - touchStart.x;
        const ddy = t.clientY - touchStart.y;
        if (ddx * ddx + ddy * ddy > TAP_THRESHOLD * TAP_THRESHOLD) touchStart = null;
      }
      requestRender();
    } else if (e.touches.length >= 2 && pinchPrev) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      camera.x += cx - pinchPrev.cx;
      camera.y += cy - pinchPrev.cy;
      const newZoom = Math.max(0.15, Math.min(5, camera.zoom * (dist / pinchPrev.dist)));
      const f = newZoom / camera.zoom;
      const rect = canvas.getBoundingClientRect();
      const mx = cx - rect.left - canvas.width  / 2;
      const my = cy - rect.top  - canvas.height / 2;
      camera.x = mx - (mx - camera.x) * f;
      camera.y = my - (my - camera.y) * f;
      camera.zoom = newZoom;
      pinchPrev = { dist, cx, cy };
      requestRender();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (touchStart && e.touches.length === 0) {
      const dt = Date.now() - touchStart.time;
      if (dt < TAP_TIME) {
        const rect = canvas.getBoundingClientRect();
        const mx = touchStart.x - rect.left;
        const my = touchStart.y - rect.top;
        mouse.hex = getHexUnderMouse(mx, my);
        updateInfo();
        requestRender();
      }
    }
    if (e.touches.length === 0) { panPrev = null; pinchPrev = null; touchStart = null; }
    else if (e.touches.length === 1) {
      pinchPrev = null;
      panPrev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: false });

  canvas.addEventListener('touchcancel', () => {
    panPrev = null; pinchPrev = null; touchStart = null;
  });
}

function setupKeyboard() {
  const keys = new Set();
  let rafId = null;
  function tick() {
    let dx = 0, dy = 0; const step = 22;
    if (keys.has('w') || keys.has('arrowup'))    dy += step;
    if (keys.has('s') || keys.has('arrowdown'))  dy -= step;
    if (keys.has('a') || keys.has('arrowleft'))  dx += step;
    if (keys.has('d') || keys.has('arrowright')) dx -= step;
    if (dx || dy) { camera.x += dx; camera.y += dy; requestRender(); }
    rafId = keys.size > 0 ? requestAnimationFrame(tick) : null;
  }
  window.addEventListener('keydown', e => {
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const k = e.key.toLowerCase();
    if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) {
      keys.add(k); if (rafId === null) tick(); e.preventDefault();
    } else if (k === '+' || k === '=') { zoomBy(1.25); e.preventDefault(); }
    else if (k === '-' || k === '_')   { zoomBy(1 / 1.25); e.preventDefault(); }
    else if (k === '0')                 { fitMap(); e.preventDefault(); }
    else if (k === 'g')                 { setViewMode('game'); }
    else if (k === 'b')                 { setViewMode('debug'); }
  });
  window.addEventListener('keyup', e => { keys.delete(e.key.toLowerCase()); });
  window.addEventListener('blur',  () => keys.clear());
}

let renderQueued = false;
function requestRender() {
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => {
    renderQueued = false;
    renderVisibleHexes();
  });
}

function zoomBy(factor) {
  const newZoom = Math.max(0.15, Math.min(5, camera.zoom * factor));
  const wx = -camera.x / camera.zoom;
  const wy = -camera.y / camera.zoom;
  camera.zoom = newZoom;
  camera.x = -wx * camera.zoom;
  camera.y = -wy * camera.zoom;
  requestRender();
}
function fitMap() {
  const center = axialToPixel(MAP_W / 2, MAP_H / 2);
  const mapW = 1.5 * HEX_SIZE * MAP_W + HEX_SIZE * 2;
  const mapH = SQRT3 * HEX_SIZE * (MAP_H + MAP_W / 2) + HEX_SIZE * 2;
  const zX = canvas.width  / mapW;
  const zY = canvas.height / mapH;
  camera.zoom = Math.max(0.15, Math.min(5, Math.min(zX, zY) * 0.92));
  camera.x = -center.x * camera.zoom;
  camera.y = -center.y * camera.zoom;
  requestRender();
}

function setupLegend() {
  document.getElementById('legendBody').innerHTML =
    Object.entries(BIOME_COLORS).map(([name, color]) =>
      `<div class="legend-item">
         <div class="swatch" style="background:${color}"></div>
         <span>${name}</span>
       </div>`
    ).join('');
}

function syncSlidersFromParams() {
  const set = (id, key, dec) => {
    const el = document.getElementById(id);
    const lbl = document.getElementById(id + 'Val');
    if (el) el.value = params[key];
    if (lbl) lbl.textContent = params[key].toFixed(dec);
  };
  set('waterLevel',      'waterLevel',      2);
  set('mountainLevel',   'mountainLevel',   2);
  set('elevScale',       'elevScale',       3);
  set('moistScale',      'moistScale',      3);
  set('moistureBias',    'moistureBias',    2);
  set('gameGridOpacity', 'gameGridOpacity', 2);
}

function applyPreset(name) {
  const P = PRESETS[name];
  if (!P) return;
  Object.assign(params, P);
  syncSlidersFromParams();
  generateWorld();
  requestRender();
}

function setViewMode(mode) {
  params.viewMode = mode;
  document.getElementById('btnGameView').classList.toggle('active',  mode === 'game');
  document.getElementById('btnDebugView').classList.toggle('active', mode === 'debug');
  requestRender();
}

function setupControls() {
  const bindSlider = (id, key, decimals = 3) => {
    const el  = document.getElementById(id);
    const lbl = document.getElementById(id + 'Val');
    el.value = params[key];
    lbl.textContent = params[key].toFixed(decimals);
    el.addEventListener('input', () => {
      params[key] = parseFloat(el.value);
      lbl.textContent = params[key].toFixed(decimals);
      if (['waterLevel','mountainLevel','elevScale','moistScale','moistureBias'].includes(key)) {
        generateWorld();
      }
      requestRender();
    });
  };
  bindSlider('waterLevel',      'waterLevel',      2);
  bindSlider('mountainLevel',   'mountainLevel',   2);
  bindSlider('elevScale',       'elevScale',       3);
  bindSlider('moistScale',      'moistScale',      3);
  bindSlider('moistureBias',    'moistureBias',    2);
  bindSlider('gameGridOpacity', 'gameGridOpacity', 2);

  document.getElementById('seedInput').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (!isNaN(v)) params.seed = v;
  });
  document.getElementById('btnRegen').addEventListener('click', () => {
    const v = parseInt(document.getElementById('seedInput').value);
    if (!isNaN(v)) params.seed = v;
    generateWorld();
    requestRender();
  });
  document.getElementById('btnRandom').addEventListener('click', () => {
    const s = Math.floor(Math.random() * 1e9);
    params.seed = s;
    document.getElementById('seedInput').value = s;
    generateWorld();
    requestRender();
  });

  document.querySelectorAll('button.preset').forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });

  document.getElementById('btnGameView') .addEventListener('click', () => setViewMode('game'));
  document.getElementById('btnDebugView').addEventListener('click', () => setViewMode('debug'));

  const bindToggle = (id, key) => {
    const el = document.getElementById(id);
    el.checked = params[key];
    el.addEventListener('change', () => {
      params[key] = el.checked;
      requestRender();
    });
  };
  bindToggle('showVariation',         'showVariation');
  bindToggle('showTransitions',       'showTransitions');
  bindToggle('showDetails',           'showDetails');
  bindToggle('showHexGridInGame',     'showHexGridInGame');
  bindToggle('showSelectedCenterDot', 'showSelectedCenterDot');
  bindToggle('showAxialTextOnHover',  'showAxialTextOnHover');

  document.getElementById('btnZoomIn') .addEventListener('click', () => zoomBy( 1.30));
  document.getElementById('btnZoomOut').addEventListener('click', () => zoomBy(1 / 1.30));
  document.getElementById('btnCenter') .addEventListener('click', fitMap);

  document.getElementById('btnMenu').addEventListener('click', () => {
    document.getElementById('controls').classList.toggle('collapsed');
  });
  document.getElementById('btnLegendClose').addEventListener('click', () => {
    document.getElementById('legend').classList.add('collapsed');
  });
  document.getElementById('btnLegend').addEventListener('click', () => {
    document.getElementById('legend').classList.remove('collapsed');
  });

  if (window.innerWidth < 720) {
    document.getElementById('controls').classList.add('collapsed');
    document.getElementById('legend').classList.add('collapsed');
  }

  document.getElementById('btnExportVisible').addEventListener('click', () => exportJSON(true));
  document.getElementById('btnExportFull')   .addEventListener('click', () => exportJSON(false));
}

function updateInfo() {
  const body = document.getElementById('infoBody');
  if (!mouse.hex || !inBounds(mouse.hex.q, mouse.hex.r)) {
    body.textContent = 'Tap/hover hex để xem...';
    return;
  }
  const t = world[mouse.hex.q][mouse.hex.r];
  body.innerHTML =
    `<div class="field"><span class="key">q, r</span><span class="v">${t.q}, ${t.r}</span></div>
     <div class="field"><span class="key">elevation</span><span class="v">${t.elevation.toFixed(3)}</span></div>
     <div class="field"><span class="key">moisture</span><span class="v">${t.moisture.toFixed(3)}</span></div>
     <div class="field"><span class="key">temperature</span><span class="v">${t.temperature.toFixed(3)}</span></div>
     <div class="field"><span class="key">biome</span><span class="v biome" style="color:${BIOME_COLORS[t.biome]}">${t.biome}</span></div>`;
}

function exportJSON(visibleOnly) {
  let tiles = [];
  if (visibleOnly) {
    const halfW = canvas.width  / (2 * camera.zoom);
    const halfH = canvas.height / (2 * camera.zoom);
    const minX = -camera.x / camera.zoom - halfW;
    const maxX = -camera.x / camera.zoom + halfW;
    const minY = -camera.y / camera.zoom - halfH;
    const maxY = -camera.y / camera.zoom + halfH;
    for (let q = 0; q < MAP_W; q++) for (let r = 0; r < MAP_H; r++) {
      const { x, y } = axialToPixel(q, r);
      if (x >= minX && x <= maxX && y >= minY && y <= maxY) tiles.push(world[q][r]);
    }
  } else {
    for (let q = 0; q < MAP_W; q++) for (let r = 0; r < MAP_H; r++) tiles.push(world[q][r]);
  }
  const data = {
    seed: params.seed,
    params: { ...params },
    width: MAP_W, height: MAP_H,
    visibleOnly, tileCount: tiles.length,
    tiles,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hex_terrain_${visibleOnly ? 'visible' : 'full'}_seed${params.seed}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  requestRender();
}

function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');

  setupLegend();
  setupControls();
  setupMouse();
  setupTouch();
  setupKeyboard();

  generateWorld();

  window.addEventListener('resize', resize);
  resize();
  fitMap();
}

init();
</script>
</body>
</html>
